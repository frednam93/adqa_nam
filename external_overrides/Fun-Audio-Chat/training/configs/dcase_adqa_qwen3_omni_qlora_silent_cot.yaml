### model
model_name_or_path: /home/user/ssdmain/models/dcase_adqa/qwen3_omni_30b_a3b_instruct
trust_remote_code: true
quantization_bit: 4
quantization_method: bnb

### method
stage: sft
do_train: true
do_eval: false
finetuning_type: lora
lora_rank: 4
lora_alpha: 8
lora_dropout: 0.05
lora_target: q_proj,v_proj
flash_attn: auto
freeze_vision_tower: true
freeze_multi_modal_projector: true
print_param_status: false
upcast_layernorm: true

### dataset
dataset: dcase_adqa_qwen3_omni_silent_cot_train
dataset_dir: /home/user/ssdmain/dcase-adqa/external/Fun-Audio-Chat/training/data
template: qwen3_omni_nothink
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: /home/user/ssdmain/dcase-adqa/outputs/qwen3_omni_qlora_silent_cot
logging_steps: 10
save_strategy: steps
save_steps: 1000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
learning_rate: 5.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
disable_gradient_checkpointing: false
